name: build

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  OTP_LATEST: "29"
  MIN_AGE_HOURS: 1
  # Number of most-recent Hex.pm releases to keep active (not retire).
  KEEP_RELEASES: 3

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      APP_FILE: ${{ steps.compute.outputs.APP_FILE }}
      APP:      ${{ steps.compute.outputs.APP }}
      VERSION:  ${{ steps.compute.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v2
      - name: Get application name and version
        id:   app-name-and-version
        run: |
          get_version() { sed -nE 's/.*\{vsn,\s*"([^"]+)".*/\1/p' | head -1; }

          APP_FILE=$(find src -name '*.app.src' | head -1)
          APP=$(sed -n '/\bapplication\b/{s/.*application,\s*\([a-z]\+\).*/\1/p}' $APP_FILE)
          VERSION=$(cat $APP_FILE | get_version)
          echo "APP_FILE=$APP_FILE" >> $GITHUB_OUTPUT
          echo "APP=$APP"           >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"   >> $GITHUB_OUTPUT

  linux:
    runs-on: ubuntu-latest
    needs: setup
    env:
      APP_FILE: ${{ needs.setup.outputs.APP_FILE }}
      APP:      ${{ needs.setup.outputs.APP }}
      VERSION:  ${{ needs.setup.outputs.VERSION }}

    name: OTP ${{ matrix.otp }} ${{ matrix.os }}.${{ matrix.compiler.compiler }}

    container:
      image: erlang:${{matrix.otp}}

    strategy:
      fail-fast: false
      matrix:
        os: [ linux ]
        compiler:
          - { compiler: GNU-14,  CC: gcc-14,   CXX: g++-14 }
          - { compiler: GNU-12,  CC: gcc-12,   CXX: g++-12 }
          - { compiler: LLVM-19, CC: clang-19, CXX: clang++-19 }
        otp: [27, 28, 29]
        exclude:
          # GCC 14 and clang 19 are only available in OTP 28 (Debian Bookworm+)
          - { otp: 27, compiler: { compiler: GNU-14 } }
          - { otp: 27, compiler: { compiler: LLVM-19 } }
          # GCC 12 is available in OTP 27 (Debian Bookworm)
          - { otp: 28, compiler: { compiler: GNU-12 } }
          - { otp: 29, compiler: { compiler: GNU-12 } }

    steps:
      - uses: actions/checkout@v2
      - name: OTP Version
        run:  erl -eval '{ok, Version} = file:read_file(filename:join([code:root_dir(), "releases", erlang:system_info(otp_release), "OTP_VERSION"])), io:format("Version=~s\n", [Version]), halt().' -noshell -noinput;
      - name: Fix Ownership
        run:  git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Install build tools
        run:  |
          apt-get update -qq
          apt-get install -y --no-install-recommends curl gnupg lsb-release cmake
          # Debian's default repos only ship clang up to ~16; pull newer LLVM
          # releases from the official apt.llvm.org repo when needed.
          if ! apt-cache show ${{ matrix.compiler.CC }} >/dev/null 2>&1; then
            LLVM_VER=$(echo "${{ matrix.compiler.compiler }}" | sed -E 's/^LLVM-//')
            curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
            bash /tmp/llvm.sh "$LLVM_VER"
          fi
          apt-get install -y --no-install-recommends ${{ matrix.compiler.CC }} ${{ matrix.compiler.CXX }}
          # Clang emits LLVM-bitcode objects under LTO; lld is required to link them.
          if echo "${{ matrix.compiler.compiler }}" | grep -q '^LLVM-'; then
            LLVM_VER=$(echo "${{ matrix.compiler.compiler }}" | sed -E 's/^LLVM-//')
            apt-get install -y --no-install-recommends "lld-$LLVM_VER" || apt-get install -y --no-install-recommends lld
          fi
      - name: Build
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  make compile
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: _build/default/*_plt
          key: dialyzer-plt-${{ matrix.os }}-otp${{ matrix.otp }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
      - name: Check
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  make check
      - name: Sanitize Memory
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run: make memcheck
      - name: Test
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  |
          adduser --disabled-password --gecos '' newuser
          chown -R newuser:newuser .
          su -c "make test" newuser

  macOS:
    name: OTP ${{ matrix.otp }} macos.${{ matrix.compiler.compiler }}
    runs-on: macos-latest
    needs: setup
    env:
      APP_FILE: ${{ needs.setup.outputs.APP_FILE }}
      APP:      ${{ needs.setup.outputs.APP }}
      VERSION:  ${{ needs.setup.outputs.VERSION }}
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { compiler: XCode, CC: cc, CXX: c++ }
        otp: [27, 28, 29]
    steps:
      - uses: actions/checkout@v2
      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3'
      - name: OTP Version
        run:  erl -eval '{ok, Version} = file:read_file(filename:join([code:root_dir(), "releases", erlang:system_info(otp_release), "OTP_VERSION"])), io:format("Version=~s\n", [Version]), halt().' -noshell -noinput;
      - name: Fix Ownership
        run:  git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Install CMake
        run:  brew install cmake
      - name: Build
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  make compile
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: _build/default/*_plt
          key: dialyzer-plt-macos-otp${{ matrix.otp }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
      - name: Check
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  make check
      - name: Test
        env:
          CC:  ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run:  make test

  windows:
    name: OTP ${{ matrix.otp }} windows
    # Pinned to windows-2022 (win22 image) — windows-latest now points at a
    # win25-vs2026 image that erlef/setup-beam@v1 doesn't recognize yet.
    # Revert to windows-latest once setup-beam adds win25 support.
    runs-on: windows-2022
    needs: setup
    env:
      APP_FILE: ${{ needs.setup.outputs.APP_FILE }}
      APP:      ${{ needs.setup.outputs.APP }}
      VERSION:  ${{ needs.setup.outputs.VERSION }}
    #continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        otp: [27, 28, 29]

    steps:
      - uses: actions/checkout@v2
      - name: Install Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3'
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            make
      - name: Debug Erlang discovery
        shell: msys2 {0}
        run: |
          which erl || echo "erl not found"
          erl -noshell -noinput -eval 'io:format("root_dir=~ts~n",[code:root_dir()]),io:format("ei_include=~ts~n",[code:lib_dir(erl_interface,include)]),io:format("ei_lib=~ts~n",[code:lib_dir(erl_interface,lib)]),halt(0).'
      - name: Build
        shell: msys2 {0}
        env:
          CC:  gcc
          CXX: g++
        run:  make compile
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: _build/default/*_plt
          key: dialyzer-plt-windows-otp${{ matrix.otp }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
      - name: Check
        shell: msys2 {0}
        env:
          CC:  gcc
          CXX: g++
        run:  make check
      - name: Test
        shell: msys2 {0}
        env:
          CC:  gcc
          CXX: g++
        run:  make test

  detect-release:
    name:  Detect Release
    runs-on: ubuntu-latest
    needs: [setup, linux, macOS, windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      APP_FILE:       ${{ needs.setup.outputs.APP_FILE }}
      APP:            ${{ needs.setup.outputs.APP }}
      VERSION:        ${{ needs.setup.outputs.VERSION }}
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      version:        ${{ steps.resolve.outputs.version }}
      publish:        ${{ steps.resolve.outputs.publish }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release version
        id: resolve
        run: |
          get_version() { sed -nE 's/.*\{vsn,\s*"([^"]+)".*/\1/p' | head -1; }

          PARENT_VERSION=$(git show "HEAD^:${APP_FILE}" 2>/dev/null | get_version || true)

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "$VERSION" != "$PARENT_VERSION" ]; then
            echo "Version changed: $PARENT_VERSION -> $VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

          # Check whether $VERSION is already published to Hex.pm — this can
          # happen even when the version just changed, if a prior run of this
          # workflow (for the same commit) already published it and only
          # failed in a later step (e.g. tagging/release creation).
          INSERTED_AT=$(curl -fsS "https://hex.pm/api/packages/$APP" | \
                        jq -r --arg v "$VERSION" '.releases[] | select(.version == $v) | .inserted_at')

          MIN_AGE=$((MIN_AGE_HOURS * 3600))

          if [ -z "$INSERTED_AT" ]; then
            echo "Version $VERSION not yet published to Hex.pm"
            echo "publish=true"        >> $GITHUB_OUTPUT
          else
            PUBLISHED_TS=$(date -u -d "$INSERTED_AT" +%s)
            NOW_TS=$(date +%s)
            AGE=$((NOW_TS - PUBLISHED_TS))

            if [ "$AGE" -lt "$MIN_AGE" ]; then
              echo "Republishing release ($VERSION), published $((AGE / 60)) minutes ago"
              echo "publish=replace"    >> $GITHUB_OUTPUT
            else
              echo "Skipping version $VERSION - published $((AGE / 60)) minutes ago, too old to replace"
              echo "publish=false"      >> $GITHUB_OUTPUT
            fi
          fi

  publish-to-hex:
    name:  Publish to Hex.pm
    runs-on: ubuntu-latest
    needs: [detect-release, setup]
    if: needs.detect-release.outputs.publish != 'false'

    env:
      APP_FILE: ${{ needs.setup.outputs.APP_FILE }}
      APP:      ${{ needs.setup.outputs.APP }}
      VERSION:  ${{ needs.setup.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rebar3
        uses: erlef/setup-beam@v1
        with:
          # Latest that excludes pre-releases
          otp-version: "> 0"
          elixir-version: "> 0"
          rebar3-version: '3'
          hexpm-mirrors: |
            https://builds.hex.pm
            https://cdn.jsdelivr.net/hex

      - name: Publish to Hex.pm
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          VERSION="${{ needs.detect-release.outputs.version }}"
          if [ "${{ needs.detect-release.outputs.publish }}" = "replace" ]; then
            echo "Replacing $APP $VERSION (published within the last hour)"
            rebar3 hex publish --repo hexpm --yes --replace
          else
            echo "Publishing $APP $VERSION"
            rebar3 hex publish --repo hexpm --yes
          fi

      - name: Retire prior version
        run: |
          set +e

          # Releases are returned newest-first.
          VSNS=$(curl -fsS "https://hex.pm/api/packages/$APP" | jq -r '.releases[].version')

          if [ -z "$VSNS" ]; then
            echo "$APP: no releases were found on Hex"
            exit 0
          fi

          echo "Releases (newest first):"
          printf '%s\n' "$VSNS"

          # Keep the KEEP_RELEASES most recent versions untouched; only
          # consider retiring anything older than that.
          KEEP=$(printf '%s\n' "$VSNS" | head -n "$KEEP_RELEASES")
          CANDIDATES=$(printf '%s\n' "$VSNS" | tail -n +"$((KEEP_RELEASES + 1))")

          if [ -z "$CANDIDATES" ]; then
            echo "$APP: $KEEP_RELEASES or fewer releases, nothing to retire"
            exit 0
          fi

          echo "Keeping latest versions:"
          printf '%s\n' "$KEEP"

          for VSN in $CANDIDATES; do
            RETIREMENT=$(curl -fsS "https://hex.pm/api/packages/$APP/releases/$VSN" | jq -r '.retirement')
            if [ "$RETIREMENT" = "null" ]; then
              echo "Retiring version $VSN of $APP on Hex..."
              mix hex.retire $APP $VSN deprecated --message "Deprecated"
            else
              echo "$APP $VSN is already retired, skipping"
            fi
          done
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
